<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ProgressRadar · 仪表盘</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dash-shell">
  <div class="dash-header">
    <div class="brand"><span class="brand-dot"></span><span class="dash-title">ProgressRadar 仪表盘</span></div>
    <div class="dash-tools">
      <div class="toggle-group" id="cycle-toggle">
        <button data-v="current" class="on">当前周期</button>
        <button data-v="all">全部</button>
      </div>
      <button class="bar-link" id="weekly-btn">生成周报</button>
      <button class="bar-link" id="export-raw-btn" title="把所有粘贴过的原始内容导出到桌面（用于重构 / 备份）">导出原文</button>
      <button class="bar-link" id="paste-btn">+ 粘贴</button>
    </div>
  </div>
  <div class="dash-main">
    <aside class="dash-side" id="dash-side">
      <button class="side-collapse" id="side-collapse" title="收起 / 展开（Ctrl + B）">
        <span class="side-collapse-icon">‹</span>
      </button>
      <button class="side-tab on" data-view="active" title="进行中">
        <span class="side-tab-dot active-dot"></span>
        <span class="side-tab-label">进行中</span>
        <span class="side-tab-count" id="cnt-active">0</span>
      </button>
      <button class="side-tab" data-view="honored" title="荣誉墙">
        <span class="side-tab-dot honored-dot"></span>
        <span class="side-tab-label">荣誉墙</span>
        <span class="side-tab-count" id="cnt-honored">0</span>
      </button>
      <button class="side-tab" data-view="ignored" title="已忽视">
        <span class="side-tab-dot ignored-dot"></span>
        <span class="side-tab-label">已忽视</span>
        <span class="side-tab-count" id="cnt-ignored">0</span>
      </button>
      <div class="side-divider"></div>
      <button class="side-tab" data-view="notes" title="临时记事">
        <span class="side-tab-dot notes-dot"></span>
        <span class="side-tab-label">记事</span>
      </button>
    </aside>
    <div class="dash-body">
      <div class="dash-body-inner">
        <div id="app"><div class="empty">加载中…</div></div>
      </div>
    </div>
  </div>
</div>
<div id="ctx-menu" class="ctx-menu"></div>
<script src="dashboard.js"></script>
</body>
</html>
